services:
  - type: web
    name: shikha-garments-api
    env: python
    buildCommand: pip install -r backend/requirements.txt && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "shikha-garments-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-vercel-domain.vercel.app"
    disk:
      name: media-uploads
      mountPath: /opt/render/project/src/media
      sizeGB: 1
